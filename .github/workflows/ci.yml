name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  # Anza (Solana) toolchain used to build the SVM engine from the sauce dep —
  # keep in step with the engine repo's svm-ci.yml SOLANA_VERSION.
  SOLANA_VERSION: "v3.1.14"

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The `sauce` npm dep is a private git dependency (eco-incorp/sauce). Configure
      # git to use a PAT so `pnpm install` can clone it. Set ECO_INCORP_TOKEN as a repo
      # secret (a PAT with `repo` read on eco-incorp/sauce).
      # NOTE: the package.json specifier is HTTPS, but pnpm-lock.yaml may pin the SSH
      # form (git@github.com:eco-incorp/sauce.git) if it was regenerated on a machine
      # with `url."git@github.com:".insteadOf "https://github.com/"`. The runner has no
      # SSH key, so we rewrite both the HTTPS and SSH forms to the token-authed HTTPS URL.
      - name: Configure git auth for private deps
        env:
          ECO_INCORP_TOKEN: ${{ secrets.ECO_INCORP_TOKEN }}
        run: |
          if [ -z "${ECO_INCORP_TOKEN:-}" ]; then
            echo "::error::Missing repo secret ECO_INCORP_TOKEN — required to clone the private eco-incorp/sauce git dep. Add a PAT with read access on eco-incorp/sauce under Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          # Use --add: insteadOf is multi-valued, so plain `git config` would
          # overwrite each prior value and only the last rule would survive.
          git config --global --add url."https://x-access-token:${ECO_INCORP_TOKEN}@github.com/".insteadOf "https://github.com/"
          git config --global --add url."https://x-access-token:${ECO_INCORP_TOKEN}@github.com/".insteadOf "git@github.com:"
          git config --global --add url."https://x-access-token:${ECO_INCORP_TOKEN}@github.com/".insteadOf "ssh://git@github.com/"

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.5.1

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ---- SVM engine binary ------------------------------------------------
      # The SVM integration suites (compiler/integration-test/svm-*.test.ts,
      # sdk/test/svm/solswap.e2e.test.ts) execute compiled `target: 'svm'`
      # bytecode on the real engine via LiteSVM. The engine sources ship inside
      # the pinned `sauce` git dep (svm/), so we build engine.so from
      # node_modules and cache the binary by the locked dep commit — cache hits
      # skip the Solana toolchain install entirely.
      - name: Resolve sauce dep commit
        id: sauce-dep
        run: echo "sha=$(grep -oE 'eco-incorp/sauce\.git#[0-9a-f]+' pnpm-lock.yaml | head -1 | cut -d'#' -f2)" >> "$GITHUB_OUTPUT"

      - name: Restore SVM engine binary
        id: engine-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/sauce-engine/${{ steps.sauce-dep.outputs.sha }}/engine.so
          key: engine-so-${{ steps.sauce-dep.outputs.sha }}-${{ env.SOLANA_VERSION }}

      - name: Install Solana toolchain
        if: steps.engine-cache.outputs.cache-hit != 'true'
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Build SVM engine from the sauce dep
        if: steps.engine-cache.outputs.cache-hit != 'true'
        working-directory: compiler/node_modules/sauce/svm
        run: |
          cargo build-sbf
          mkdir -p ~/.cache/sauce-engine/${{ steps.sauce-dep.outputs.sha }}
          cp target/deploy/engine.so ~/.cache/sauce-engine/${{ steps.sauce-dep.outputs.sha }}/engine.so

      - name: Enable SVM suites
        # The suites skip silently when the binary is missing — fail loudly here
        # instead so a broken build path can never look green.
        run: |
          ENGINE_SO="$HOME/.cache/sauce-engine/${{ steps.sauce-dep.outputs.sha }}/engine.so"
          test -s "$ENGINE_SO" || { echo "::error::engine.so missing at $ENGINE_SO"; exit 1; }
          echo "SAUCE_ENGINE_SO=$ENGINE_SO" >> "$GITHUB_ENV"
      # -----------------------------------------------------------------------

      - name: Build compiler
        run: pnpm --filter './compiler' build

      - name: Compiler — typecheck
        run: pnpm --filter './compiler' typecheck

      - name: Compiler — lint
        run: pnpm --filter './compiler' lint

      - name: Compiler — format check
        run: pnpm --filter './compiler' format:check

      - name: Compiler — test
        run: pnpm --filter './compiler' test

      - name: SDK — typecheck
        run: pnpm --filter './sdk' typecheck

      - name: SDK — build
        run: pnpm --filter './sdk' build

      - name: SDK — test
        run: pnpm --filter './sdk' test

      - name: Actions — typecheck
        run: pnpm --filter './actions' typecheck

      - name: Actions — build
        run: pnpm --filter './actions' build

      - name: Actions — unit tests
        run: pnpm --filter './actions' test:unit

      - name: Sync engine artifacts
        # The recipe tests import contract ABIs from sdk/src/artifacts/ (gitignored build
        # output). sync-artifacts copies them — plus the v12 runtime (V12Kitchen/V12Pot/
        # V12RuntimeBytecode) — from the sauce engine's forge-build output, produced by the
        # compiler postinstall during `pnpm install`. v12 is the default test engine, so the
        # EVM harness throws ("v12 artifacts missing") unless these are present (V12_AVAILABLE).
        run: pnpm --filter './dev-tools' sync-artifacts

      - name: Recipes — fast tests (compile + math)
        # No anvil, no RPC: compiles every recipe to bytecode and runs the pure-bigint
        # known-answer math (TickMath, fee-adjust, water-fill conservation).
        run: pnpm --filter './sdk' test:recipes

      - name: Recipes — local EVM tests (BOTH engines)
        # *.evm.test.ts only — boots a fresh anvil (NO fork) per file, deploys the real
        # protocol + Sauce engine bytecode, and cooks the compiled recipe on BOTH engines.
        # ECO_ENGINE=both runs each dual-engine test's v1 (Solidity Router — the deployed live
        # class) AND v12 (Huff V12Pot) cells, so CI enforces the wei-exact dual-engine parity the
        # recipes depend on (previously CI ran the v12 default only, and v1-specific regressions —
        # e.g. a floor firing on an adverse-drift cell — could merge undetected).
        # The BASE_RPC_URL fork tests ({mega,alpha,giga}swap, ecoswap.test.ts) are plain
        # .test.ts and are NOT matched by the *.evm.test.ts glob, so they never run here.
        # Runs with --test-concurrency=1 (set in the test:recipes:evm script) so the per-file
        # anvil/shared-state tests don't contend under node:test's default file parallelism.
        run: ECO_ENGINE=both pnpm --filter './sdk' test:recipes:evm
