name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The `sauce` npm dep is a private git dependency (eco-incorp/sauce). Configure
      # git to use a PAT so `pnpm install` can clone it. Set ECO_INCORP_TOKEN as a repo
      # secret (a PAT with `repo` read on eco-incorp/sauce).
      # NOTE: the package.json specifier is HTTPS, but pnpm-lock.yaml may pin the SSH
      # form (git@github.com:eco-incorp/sauce.git) if it was regenerated on a machine
      # with `url."git@github.com:".insteadOf "https://github.com/"`. The runner has no
      # SSH key, so we rewrite both the HTTPS and SSH forms to the token-authed HTTPS URL.
      - name: Configure git auth for private deps
        env:
          ECO_INCORP_TOKEN: ${{ secrets.ECO_INCORP_TOKEN }}
        run: |
          if [ -z "${ECO_INCORP_TOKEN:-}" ]; then
            echo "::error::Missing repo secret ECO_INCORP_TOKEN — required to clone the private eco-incorp/sauce git dep. Add a PAT with read access on eco-incorp/sauce under Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          # Use --add: insteadOf is multi-valued, so plain `git config` would
          # overwrite each prior value and only the last rule would survive.
          git config --global --add url."https://x-access-token:${ECO_INCORP_TOKEN}@github.com/".insteadOf "https://github.com/"
          git config --global --add url."https://x-access-token:${ECO_INCORP_TOKEN}@github.com/".insteadOf "git@github.com:"
          git config --global --add url."https://x-access-token:${ECO_INCORP_TOKEN}@github.com/".insteadOf "ssh://git@github.com/"

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.5.1

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ---- SVM engine binary ------------------------------------------------
      # The SVM integration suites (compiler/integration-test/svm-*.test.ts,
      # sdk/test/svm/*) execute compiled `target: 'svm'` bytecode on the real
      # engine via LiteSVM. The engine binary is vendored at
      # artifacts/svm/engine.so (committed, force-added — built from the exact
      # commit the `sauce` git dep is pinned to) and that's the harnesses'
      # default SAUCE_ENGINE_SO path, so these suites run offline here, same as
      # the EVM ones — no Solana toolchain install, no cargo build-sbf. Fail
      # loudly if it's somehow missing instead of letting the suites skip
      # silently and look green.
      - name: Verify vendored SVM engine binary
        run: test -s artifacts/svm/engine.so || { echo "::error::artifacts/svm/engine.so missing or empty"; exit 1; }
      # -----------------------------------------------------------------------

      # The committed EVM engine artifacts (sdk/dist/artifacts — Router,
      # SauceRouter, V12*, interfaces) ship to downstream SDK consumers for their
      # local tests/deploys, so they must track the pinned `sauce` engine. They
      # are not build output, so a repin would otherwise leave them stale
      # silently. Re-sync from the freshly-installed engine build (foundry v1.5.1
      # + solc 0.8.27 → byte-reproducible) and fail if the committed copies drift.
      - name: Verify engine artifacts are in sync with the pinned engine
        run: |
          pnpm --filter './sdk' sync-engine-artifacts
          if [ -n "$(git status --porcelain -- sdk/dist/artifacts)" ]; then
            echo "::error::sdk/dist/artifacts is stale vs the pinned sauce engine. Run 'pnpm --filter ./sdk sync-engine-artifacts' and commit the result.";
            git --no-pager diff --stat -- sdk/dist/artifacts;
            exit 1;
          fi
      # -----------------------------------------------------------------------

      - name: Build compiler
        run: pnpm --filter './compiler' build

      - name: Compiler — typecheck
        run: pnpm --filter './compiler' typecheck

      - name: Compiler — lint
        run: pnpm --filter './compiler' lint

      - name: Compiler — format check
        run: pnpm --filter './compiler' format:check

      - name: Compiler — test
        run: pnpm --filter './compiler' test

      - name: SDK — typecheck
        run: pnpm --filter './sdk' typecheck

      - name: SDK — build
        run: pnpm --filter './sdk' build

      - name: SDK — test
        run: pnpm --filter './sdk' test

      - name: Actions — typecheck
        run: pnpm --filter './actions' typecheck

      - name: Actions — build
        run: pnpm --filter './actions' build

      - name: Actions — unit tests
        run: pnpm --filter './actions' test:unit

      - name: Dev Tools — test
        run: pnpm --filter './dev-tools' test
