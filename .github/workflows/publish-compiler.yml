name: Publish Compiler

on:
  workflow_dispatch:
  push:
    tags:
      - 'compiler-v*'

jobs:
  publish:
    name: Publish @eco/sauce-compiler to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @eco/sauce-compiler typecheck

      - name: Lint
        run: pnpm --filter @eco/sauce-compiler lint

      - name: Test
        run: pnpm --filter @eco/sauce-compiler test

      - name: Build
        run: pnpm --filter @eco/sauce-compiler build

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/compiler-v')
        working-directory: compiler
        run: |
          VERSION="${GITHUB_REF_NAME#compiler-v}"
          npm version "$VERSION" --no-git-tag-version

      - name: Publish
        working-directory: compiler
        run: pnpm publish --no-git-checks --access restricted
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
