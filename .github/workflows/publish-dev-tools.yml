name: Publish Dev Tools

on:
  workflow_dispatch:
    inputs:
      compiler_version:
        description: 'sauce-compiler version to depend on (must already be published)'
        required: true
        default: 'latest'
  push:
    tags:
      - 'dev-tools-v*'

jobs:
  publish:
    name: Publish @eco/sauce-dev-tools to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build compiler
        run: pnpm --filter @eco/sauce-compiler build

      - name: Test
        run: pnpm --filter @eco/sauce-dev-tools test

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/dev-tools-v')
        working-directory: dev-tools
        run: |
          VERSION="${GITHUB_REF_NAME#dev-tools-v}"
          npm version "$VERSION" --no-git-tag-version

      - name: Rewrite workspace dep to published compiler version
        working-directory: dev-tools
        env:
          COMPILER_VERSION: ${{ inputs.compiler_version || 'latest' }}
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.dependencies['@eco/sauce-compiler'] = process.env.COMPILER_VERSION;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish
        working-directory: dev-tools
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
