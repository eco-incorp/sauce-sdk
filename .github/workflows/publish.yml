name: Publish

# Publishes every non-private workspace package (@eco-incorp/sauce-compiler,
# @eco-incorp/sauce-dev-tools, @eco-incorp/sauce-sdk, @eco-incorp/sauce-actions) to public npm
# at the version derived from a `v*` tag.
#
# pnpm publish -r walks the workspace in topological order and rewrites
# workspace:* deps to the version being published, so downstream packages
# get a proper @eco-incorp/sauce-compiler@X.Y.Z pin instead of `workspace:*`.
#
# Trigger:
#   git tag v1.2.3 && git push origin v1.2.3
#   — or manual workflow_dispatch with `version` input.
#
# Required repo secrets:
#   ECO_INCORP_TOKEN   PAT with read on eco-incorp/sauce (for pnpm install
#                      of the private git dep `sauce`)
#   NPM_TOKEN          npmjs.com automation token with publish rights on
#                      the @eco scope

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish (without leading "v")
        type: string
        required: true
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish all packages to npm and GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure git auth for private deps
        env:
          ECO_INCORP_TOKEN: ${{ secrets.ECO_INCORP_TOKEN }}
        run: |
          if [ -z "${ECO_INCORP_TOKEN:-}" ]; then
            echo "Missing repo secret: ECO_INCORP_TOKEN"
            exit 1
          fi
          git config --global url."https://x-access-token:${ECO_INCORP_TOKEN}@github.com/".insteadOf "https://github.com/"

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r --filter './compiler' --filter './sdk' --filter './actions' build

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if [ -z "$VERSION" ]; then
            echo "Could not resolve version"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version $VERSION"

      - name: Set version on every workspace package
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          for pkg in compiler dev-tools sdk actions; do
            (cd "$pkg" && npm version "$VERSION" --no-git-tag-version --allow-same-version)
          done

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm -r publish --access public --no-git-checks

      - name: Publish to GitHub Packages
        # The @eco-incorp scope matches the repo owner, so the auto-provisioned
        # GITHUB_TOKEN (with `packages: write` above) can publish here directly.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cat > .npmrc <<EOF
          @eco-incorp:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}
          EOF
          pnpm -r publish --registry https://npm.pkg.github.com --no-git-checks
          rm -f .npmrc
