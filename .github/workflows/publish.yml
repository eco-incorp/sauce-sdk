name: Publish

# Publishes the single @eco-incorp/sauce-sdk package, bundling compiler / sdk /
# actions / dev-tools under one root package.json with subpath exports.
#
# Trigger:
#   git tag v1.2.3 && git push origin v1.2.3
#   — or manual workflow_dispatch with `version` input.
#
# Publishes to BOTH registries:
#   - npmjs.com                  (auth: NPM_TOKEN)
#   - npm.pkg.github.com         (auth: GITHUB_TOKEN, scoped to this repo's org)
#
# Required repo secrets:
#   ECO_INCORP_TOKEN   PAT with read on eco-incorp/sauce (for pnpm install
#                      of the private git dep `sauce`)
#   NPM_TOKEN          npmjs.com automation token with publish rights on
#                      the @eco-incorp scope
#   GITHUB_TOKEN       auto-injected by Actions; no setup needed

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish (without leading "v")
        type: string
        required: true
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish @eco-incorp/sauce-sdk
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure git auth for private deps
        env:
          ECO_INCORP_TOKEN: ${{ secrets.ECO_INCORP_TOKEN }}
        run: |
          if [ -z "${ECO_INCORP_TOKEN:-}" ]; then
            echo "Missing repo secret: ECO_INCORP_TOKEN"
            exit 1
          fi
          git config --global url."https://x-access-token:${ECO_INCORP_TOKEN}@github.com/".insteadOf "https://github.com/"

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all areas (compiler first, then sdk/actions in parallel)
        run: pnpm build

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if [ -z "$VERSION" ]; then
            echo "Could not resolve version"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version $VERSION"

      - name: Set root package version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Publish to npmjs.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish --access public --no-git-checks

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # GH Packages auth: line per registry. Add auth for npm.pkg.github.com
          # without disturbing the npmjs.org line setup-node already wrote.
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
          pnpm publish --access public --no-git-checks --registry https://npm.pkg.github.com
